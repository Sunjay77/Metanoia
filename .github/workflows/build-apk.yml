name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify build tools
        run: |
          echo "Java version:"
          java -version
          echo ""
          echo "Gradle version:"
          gradle --version || echo "Gradle not in PATH"
          echo ""
          echo "Android SDK location: $ANDROID_SDK_ROOT"
          echo "Android Home: $ANDROID_HOME"

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Install Cordova globally
        run: npm install -g cordova

      - name: Create Cordova project with config
        run: |
          cordova create cordova-build com.metanoia.app Metanoia
          cd cordova-build

          # Update config.xml with app metadata
          cat > config.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.metanoia.app" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>Metanoia</name>
              <description>
                  Keep track of what matters - Modern minimal todo app
              </description>
              <author email="dev@metanoia.app" href="https://metanoia.app">
                  Metanoia Team
              </author>
              <content src="index.html" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <platform name="android">
                  <allow-intent href="market:*" />
              </platform>
          </widget>
          EOF

          cordova platform add android

      - name: Copy built app to Cordova
        run: |
          rm -rf cordova-build/www/* || true
          cp -r dist/* cordova-build/www/

      - name: Build APK
        run: |
          cd cordova-build
          echo "Starting Cordova build..."
          cordova build android --release
          echo "Build completed, checking for APK..."
          ls -la platforms/android/app/build/outputs/apk/ || echo "No apk directory found"
          find . -name "*.apk" -type f 2>/dev/null | head -20

      - name: Find APK and prepare for upload
        run: |
          echo "=== Looking for APK files ==="
          APK_PATH=$(find cordova-build -name "*.apk" -type f 2>/dev/null | grep -E '(release|app).*\.apk$' | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found! Checking build directory structure..."
            find cordova-build/platforms/android -type d | head -20
            exit 1
          fi

          echo "✓ Found APK at: $APK_PATH"
          cp "$APK_PATH" Metanoia.apk
          ls -lh Metanoia.apk
          echo "✓ APK ready: Metanoia.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Metanoia
          path: Metanoia.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Metanoia.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

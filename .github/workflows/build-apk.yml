name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Install Cordova globally
        run: npm install -g cordova

      - name: Create Cordova project
        run: |
          cordova create cordova-build com.metanoia.app Metanoia
          cd cordova-build
          cordova platform add android

      - name: Copy built app to Cordova
        run: |
          rm -rf cordova-build/www/* || true
          cp -r dist/* cordova-build/www/

      - name: Build APK
        run: |
          cd cordova-build
          cordova build android --release

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: metanoia-app
          path: cordova-build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: cordova-build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

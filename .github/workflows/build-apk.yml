name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Install Cordova globally
        run: npm install -g cordova

      - name: Create Cordova project with config
        run: |
          cordova create cordova-build com.metanoia.app Metanoia
          cd cordova-build

          # Update config.xml with app metadata
          cat > config.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="com.metanoia.app" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
              <name>Metanoia</name>
              <description>
                  Keep track of what matters - Modern minimal todo app
              </description>
              <author email="dev@metanoia.app" href="https://metanoia.app">
                  Metanoia Team
              </author>
              <content src="index.html" />
              <allow-intent href="http://*/*" />
              <allow-intent href="https://*/*" />
              <platform name="android">
                  <allow-intent href="market:*" />
              </platform>
          </widget>
          EOF

          cordova platform add android

      - name: Copy built app to Cordova
        run: |
          rm -rf cordova-build/www/* || true
          cp -r dist/* cordova-build/www/

      - name: Build APK
        run: |
          cd cordova-build
          cordova build android --release

      - name: Find APK and prepare for upload
        run: |
          echo "=== Looking for APK files ==="
          find cordova-build/platforms/android -name "*.apk" -type f

          # Copy unsigned APK to root with better name
          if [ -f "cordova-build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp cordova-build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk Metanoia.apk
            echo "✓ APK ready: Metanoia.apk"
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Metanoia
          path: Metanoia.apk
          if-no-files-found: warn

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: Metanoia.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
